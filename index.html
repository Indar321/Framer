<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Link in Bio</title>
    <style>
        :root {
            --bg-color: #0f0f0f;
            --text-color: #ffffff;
            --button-bg: #1e1e1e;
            --button-hover: #2a2a2a;
            --accent: #5e6ad2;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 50px 20px;
            min-height: 100vh;
        }

        .container {
            max-width: 400px;
            width: 100%;
            text-align: center;
            animation: fadeIn 0.8s ease-in-out;
        }

        .profile-pic {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            object-fit: cover;
            margin-bottom: 20px;
            border: 2px solid var(--button-bg);
        }

        h1 {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 5px;
        }

        p.bio {
            font-size: 15px;
            color: #a0a0a0;
            margin-bottom: 30px;
        }

        .links {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .link-btn {
            background-color: var(--button-bg);
            color: var(--text-color);
            text-decoration: none;
            padding: 16px 20px;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 500;
            transition: all 0.3s ease;
            display: flex;
            justify-content: center;
            align-items: center;
            border: 1px solid transparent;
        }

        .link-btn:hover {
            background-color: var(--button-hover);
            transform: translateY(-2px);
            border-color: rgba(255, 255, 255, 0.1);
        }

        /* Smooth fade-in animation, typical of Framer sites */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <div class="container">
        <img src="https://via.placeholder.com/100" alt="Profile Picture" class="profile-pic">
        
        <h1>Indrajeet Pisda</h1>
        <p class="bio">Digital Designer & Developer 👋</p>

        <div class="links">
            <a href="#" class="link-btn">My Portfolio</a>
            <a href="#" class="link-btn">Instagram</a>
            <a href="#" class="link-btn">Twitter / X</a>
            <a href="#" class="link-btn">Contact Me</a>
        </div>
    </div>

</body>
</html>
