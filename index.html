<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Indrajeet Pista</title>
    <style>
        /* Replicating Framer's default Inter font */
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');

        :root {
            --bg: #050505;
            --surface: rgba(255, 255, 255, 0.03);
            --border: rgba(255, 255, 255, 0.08);
            --text-primary: #ffffff;
            --text-secondary: rgba(255, 255, 255, 0.55);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
            -webkit-font-smoothing: antialiased;
        }

        body {
            background-color: var(--bg);
            color: var(--text-primary);
            display: flex;
            justify-content: center;
            min-height: 100vh;
            padding: 80px 20px;
            /* Subtle Framer-style background glow */
            background-image: radial-gradient(circle at 50% 0%, rgba(40, 40, 40, 0.6) 0%, transparent 60%);
        }

        .framer-container {
            width: 100%;
            max-width: 400px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 32px;
            /* Framer's signature smooth entrance */
            animation: framerAppear 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        .profile-section {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            gap: 16px;
        }

        .avatar {
            width: 96px;
            height: 96px;
            border-radius: 50%;
            background: var(--surface);
            border: 1px solid var(--border);
            object-fit: cover;
            box-shadow: 0 8px 32px rgba(0,0,0,0.4);
        }

        .title {
            font-size: 22px;
            font-weight: 600;
            letter-spacing: -0.5px;
        }

        .subtitle {
            font-size: 15px;
            color: var(--text-secondary);
            font-weight: 400;
            max-width: 280px;
            line-height: 1.5;
        }

        .links-wrapper {
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .framer-link {
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 18px 24px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 16px;
            color: var(--text-primary);
            text-decoration: none;
            font-size: 15px;
            font-weight: 500;
            backdrop-filter: blur(12px);
            /* Mimicking Framer's Spring Physics */
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            cursor: pointer;
        }

        .framer-link:hover {
            background: rgba(255, 255, 255, 0.06);
            transform: scale(1.02);
            border-color: rgba(255, 255, 255, 0.15);
        }

        .framer-link:active {
            transform: scale(0.97);
            transition: all 0.1s ease;
        }

        .link-icon {
            width: 18px;
            height: 18px;
            opacity: 0.7;
        }

        @keyframes framerAppear {
            0% { opacity: 0; transform: translateY(20px); filter: blur(5px); }
            100% { opacity: 1; transform: translateY(0); filter: blur(0); }
        }
    </style>
</head>
<body>

    <div class="framer-container">
        <div class="profile-section">
            <img src="https://via.placeholder.com/150" alt="Indrajeet Pista" class="avatar">
            <div>
                <h1 class="title">Indrajeet Pista</h1>
                <p class="subtitle">Graphic Design, Branding & Web Development</p>
            </div>
        </div>

        <div class="links-wrapper">
            <a href="#" class="framer-link">
                Digital Trade
                <svg class="link-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4M14 4h6m0 0v6m0-6L10 14"></path></svg>
            </a>
            <a href="#" class="framer-link">
                Virox Streetwear
                <svg class="link-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4M14 4h6m0 0v6m0-6L10 14"></path></svg>
            </a>
            <a href="#" class="framer-link">
                Athrex Energy Pvt. Ltd.
                <svg class="link-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4M14 4h6m0 0v6m0-6L10 14"></path></svg>
            </a>
        </div>
    </div>

</body>
</html>
